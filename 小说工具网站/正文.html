<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI小说流水线 - 纯净正文提取版</title>
    <style>
        :root { --p-color: #2563eb; --bg: #f1f5f9; --code-bg: #111; --code-color: #0f0; --border: #e2e8f0; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        

        /* 侧边栏 */
        #chapter-sidebar { width: 300px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 20px; font-weight: bold; color: var(--p-color); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .nav-list { flex: 1; overflow-y: auto; padding: 10px; }
        .nav-item { padding: 10px 12px; font-size: 13px; color: #475569; cursor: pointer; border-radius: 6px; margin-bottom: 4px; border: 1px solid transparent; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .nav-item:hover { background: #f8fafc; color: var(--p-color); }
        .nav-item.active-nav { background: #eff6ff; color: var(--p-color); font-weight: bold; border-color: #bfdbfe; }

        /* 书籍列表 */
        .book-section { border-bottom: 1px solid var(--border); }
        .book-section-header { padding: 14px 20px; font-weight: bold; font-size: 13px; color: #1e293b; display: flex; justify-content: space-between; align-items: center; }
        .book-list { max-height: 200px; overflow-y: auto; padding: 0 10px 10px; }
        .book-item { padding: 8px 12px; font-size: 13px; color: #475569; cursor: pointer; border-radius: 6px; margin-bottom: 3px; border: 1px solid transparent; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .book-item:hover { background: #fef3c7; color: #92400e; }
        .book-item.active-book { background: #fef9c3; color: #854d0e; font-weight: bold; border-color: #fde047; }
        .book-item .del-btn { opacity: 0; font-size: 11px; color: #ef4444; cursor: pointer; padding: 2px 5px; border-radius: 4px; }
        .book-item:hover .del-btn { opacity: 1; }
        .book-item .del-btn:hover { background: #fee2e2; }
        .add-book-btn { margin: 0 10px 10px; padding: 7px; border-radius: 6px; font-size: 12px; font-weight: bold; background: #fef9c3; color: #854d0e; text-align: center; cursor: pointer; border: 1px dashed #fde047; }
        .add-book-btn:hover { background: #fde047; }

        /* 主操作区 */
        #main { flex: 1; display: flex; flex-direction: column; background: #fff; }
        .tab-nav { display: flex; background: #fff; border-bottom: 1px solid var(--border); padding: 0 20px; gap: 10px; }
        .tab-btn { padding: 15px 12px; cursor: pointer; font-size: 14px; font-weight: bold; color: #64748b; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--p-color); border-bottom-color: var(--p-color); }

        .workspace { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }
        .editor-part { flex: 1; display: flex; flex-direction: column; gap: 12px; min-width: 400px; position: relative; }
        textarea { width: 100%; flex: 1; border: 2px dashed var(--border); border-radius: 12px; padding: 15px; font-size: 14px; line-height: 1.6; resize: none; background: #fff; transition: 0.3s; font-family: monospace; }
        textarea.drag-over { background: #eff6ff; border-color: var(--p-color); }
        
        .output-part { flex: 1.6; display: flex; flex-direction: column; overflow-y: auto; padding: 15px; background: #f8fafc; border-radius: 12px; border: 1px solid var(--border); }
        
        .card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .card-title { font-size: 15px; font-weight: bold; margin-bottom: 10px; color: #1e293b; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; }
        .word-tag { font-size: 11px; color: #64748b; background: #f1f5f9; padding: 2px 6px; border-radius: 4px; }

        .btn-group { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; padding: 8px 12px; transition: 0.2s; }
        .btn-action { background: var(--p-color); color: white; flex: 1; }
        .btn-secondary { background: #e2e8f0; color: #475569; }
        .btn-title { background: #dbeafe; color: #1e40af; font-size: 13px; }
        .btn-body { background: #dcfce7; color: #166534; font-size: 13px; flex: 2; }
        .btn-segment { background: #ede9fe; color: #5b21b6; font-size: 12px; flex: 1 1 calc(33.333% - 8px); min-width: 96px; }
        .preview-text { font-size: 13px; color: #475569; line-height: 1.6; white-space: pre-wrap; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; margin: 8px 0; border-left: 3px solid #e2e8f0; padding-left: 10px; }
        .prompt-box { background: var(--code-bg); color: var(--code-color); padding: 12px; border-radius: 8px; font-family: monospace; font-size: 12px; white-space: pre-wrap; margin-top: 10px; }
    </style>
</head>
<body>

<div id="chapter-sidebar">
    <div class="book-section">
        <div class="book-section-header">
            <span>我的书籍</span>
        </div>
        <div id="book-list" class="book-list"></div>
        <div class="add-book-btn" onclick="addBook()">+ 新建书籍</div>
        <div style="display:flex;gap:6px;padding:0 10px 10px;">
            <button onclick="exportData()" style="flex:1;font-size:11px;padding:6px;background:#e0f2fe;color:#0369a1;border-radius:6px;">导出数据</button>
            <label style="flex:1;font-size:11px;padding:6px;background:#f0fdf4;color:#166534;border-radius:6px;text-align:center;cursor:pointer;">导入数据<input type="file" accept=".json" onchange="importData(event)" style="display:none;"></label>
        </div>
    </div>
    <div class="sidebar-header">
        <span>章节列表 (正文)</span>
        <span id="count-badge" style="background: #2563eb; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px;">0</span>
    </div>
    <div id="nav-list" class="nav-list"></div>
</div>

<div id="main">
    <div class="tab-nav">
        <div class="tab-btn active" data-tab="cover" onclick="switchTab('cover', this)">0. 封面选题</div>
        <div class="tab-btn" data-tab="volume-outline" onclick="switchTab('volume-outline', this)">1. 分卷大纲提示词</div>
        <div class="tab-btn" data-tab="volumes" onclick="switchTab('volumes', this)">2. 分卷大纲提取</div>
        <div class="tab-btn" data-tab="gen" onclick="switchTab('gen', this)">3. 细纲转提示词</div>
        <div class="tab-btn" data-tab="parse" onclick="switchTab('parse', this)">4. 智能提取正文</div>
        <div class="tab-btn" data-tab="tags-cover" onclick="switchTab('tags-cover', this)">5. 标签&封面</div>
    </div>

    <div class="workspace">
        <div class="editor-part">
            <textarea id="main-input" placeholder="粘贴内容：第一行=书名，第二行起=简介&#10;&#10;例如：&#10;重生后我成了反派的白月光&#10;她重生回到十八岁那年..." oninput="autoRefresh()"></textarea>
            <div class="btn-group">
                <button class="btn-action" onclick="manualRefresh()">解析文件</button>
                <button class="btn-secondary" onclick="clearContent()">清空</button>
            </div>
            <div style="font-size: 11px; color: #94a3b8; margin-top: 10px; line-height: 1.4;">
                * 自动过滤指令（如：5. 剧情截断）<br>
                * 自动跳过 Prompt (大纲/要求) 块<br>
                * 仅保留 Response (正文) 中的章节
            </div>
        </div>
        <div id="output-list" class="output-part"></div>
    </div>
</div>

<script>
    const CONFIG = {
        activeTab: 'cover',
        BOOKS_KEY: 'novel-books-v1',
        PREFIX: `请根据下面大纲创作正文：\n\n【`,
        SUFFIX: `】`,
        VOLUME_SEGMENT_SIZE: 10,
        VOLUME_SEGMENT_COUNT: 6
    };

    const EMPTY_TABS = { cover: '', 'volume-outline': '', gen: '', parse: '', volumes: '', 'tags-cover': '' };

    // === 书籍管理 ===
    function loadBooks() {
        return JSON.parse(localStorage.getItem(CONFIG.BOOKS_KEY) || 'null') || { books: [], activeBookId: null };
    }
    function saveBooks(data) { localStorage.setItem(CONFIG.BOOKS_KEY, JSON.stringify(data)); }

    function addBook() {
        const name = prompt('请输入书名：');
        if (!name || !name.trim()) return;
        const data = loadBooks();
        const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
        data.books.push({ id, name: name.trim(), tabs: { ...EMPTY_TABS } });
        data.activeBookId = id;
        saveBooks(data);
        switchBook(id);
    }

    function deleteBook(id, e) {
        e.stopPropagation();
        if (!confirm('确定删除该书籍？数据将无法恢复。')) return;
        const data = loadBooks();
        data.books = data.books.filter(b => b.id !== id);
        if (data.activeBookId === id) data.activeBookId = data.books[0]?.id || null;
        saveBooks(data);
        if (data.activeBookId) switchBook(data.activeBookId);
        else { editor.value = ''; manualRefresh(); }
        renderBookList();
    }

    function switchBook(id) {
        const data = loadBooks();
        data.activeBookId = id;
        saveBooks(data);
        const book = data.books.find(b => b.id === id);
        if (book) {
            editor.value = book.tabs[CONFIG.activeTab] || '';
            manualRefresh();
        }
        renderBookList();
    }

    function renderBookList() {
        const data = loadBooks();
        const list = document.getElementById('book-list');
        list.innerHTML = '';
        data.books.forEach(book => {
            const item = document.createElement('div');
            item.className = 'book-item' + (book.id === data.activeBookId ? ' active-book' : '');
            item.innerHTML = `<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${book.name}</span><span class="del-btn" onclick="deleteBook('${book.id}', event)">删除</span>`;
            item.onclick = () => switchBook(book.id);
            list.appendChild(item);
        });
    }

    function saveToCurrentBook() {
        const data = loadBooks();
        const book = data.books.find(b => b.id === data.activeBookId);
        if (book) {
            book.tabs[CONFIG.activeTab] = editor.value;
            saveBooks(data);
        }
    }

    const editor = document.getElementById('main-input');

    // 拖拽
    editor.addEventListener('dragover', (e) => { e.preventDefault(); editor.classList.add('drag-over'); });
    editor.addEventListener('dragleave', () => { editor.classList.remove('drag-over'); });
    editor.addEventListener('drop', (e) => {
        e.preventDefault(); editor.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => { editor.value = event.target.result; autoRefresh(); };
            reader.readAsText(file);
        }
    });

    function switchTab(type, btn) {
        saveToCurrentBook();
        CONFIG.activeTab = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const editorPart = document.querySelector('.editor-part');
        if (type === 'tags-cover') {
            editorPart.style.display = 'none';
        } else {
            editorPart.style.display = '';
            const data = loadBooks();
            const book = data.books.find(b => b.id === data.activeBookId);
            editor.value = book ? (book.tabs[type] || '') : '';
            editor.placeholder = type === 'cover' ? '粘贴内容：第一行=书名，第二行起=简介\n\n例如：\n重生后我成了反派的白月光\n她重生回到十八岁那年...' : type === 'volume-outline' ? '粘贴你选中的选题内容（书名+简介），自动生成分卷大纲提示词' : '可直接拖入 Gemini 导出的 MD 对话文件...';
        }
        manualRefresh();
    }

    function autoRefresh() {
        saveToCurrentBook();
        if (editor.value.length < 50000) manualRefresh();
    }

    function escapeForTemplateLiteral(text) {
        return text.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');
    }

    function getVolumeNumber(title) {
        const match = title.match(/^第\s*([0-9一二三四五六七八九十百千两零]+)\s*卷/);
        return match ? match[1] : '?';
    }

    function chineseNumberToInt(raw) {
        if (!raw) return NaN;
        if (/^\d+$/.test(raw)) return parseInt(raw, 10);

        const digitMap = { 零: 0, 一: 1, 二: 2, 两: 2, 三: 3, 四: 4, 五: 5, 六: 6, 七: 7, 八: 8, 九: 9 };
        const unitMap = { 十: 10, 百: 100, 千: 1000 };
        let result = 0;
        let section = 0;
        let number = 0;

        for (const char of raw) {
            if (digitMap[char] !== undefined) {
                number = digitMap[char];
            } else if (unitMap[char]) {
                const unit = unitMap[char];
                section += (number || 1) * unit;
                number = 0;
            }
        }

        result += section + number;
        return result || NaN;
    }

    function getVolumeSegments(volumeTitle) {
        const volumeNumber = chineseNumberToInt(getVolumeNumber(volumeTitle));
        if (!Number.isFinite(volumeNumber) || volumeNumber < 1) {
            return [];
        }

        const chapterOffset = (volumeNumber - 1) * CONFIG.VOLUME_SEGMENT_SIZE * CONFIG.VOLUME_SEGMENT_COUNT;
        return Array.from({ length: CONFIG.VOLUME_SEGMENT_COUNT }, (_, index) => {
            const start = chapterOffset + index * CONFIG.VOLUME_SEGMENT_SIZE + 1;
            const end = start + CONFIG.VOLUME_SEGMENT_SIZE - 1;
            return `${start}-${end}`;
        });
    }

    function buildVolumePrompt(volume, segment) {
        const volumeNumber = getVolumeNumber(volume.title);
        return `【${volume.content}】

请根据第【${volumeNumber}】卷剧情单元（第${segment}章），创作极度详细的分章大纲。

要求：风格搞笑，节奏紧凑，符合番茄爽文读者的阅读习惯。

每一章请严格按照以下模板生成：

第 [ ] 章：[起一个吸引人的、带梗的标题]

- 核心目标：本章要解决什么问题或达成什么爽点？

- 主要场景：[地点]

- 登场人物：[角色名]

- 关键情节（3-4个节点）：

1. [开篇]：承接上文，快速进入情境。

2. [发展]：制造冲突或笑料（如：反派嘲讽/主角装傻）。

3. [高潮]：具体的行动或反转瞬间。

- 本章爽点/情绪价值：

- 结尾钩子：[重要] 设计一个悬念或卡点，让读者忍不住想点开下一章。


请确保能完美过渡到下一章（比如第10章到第11章，第20-21章等等）

用一个新文档展示。`;
    }

    function manualRefresh() {
        const rawInput = editor.value.trim();
        const nav = document.getElementById('nav-list');
        const out = document.getElementById('output-list');
        nav.innerHTML = ''; out.innerHTML = '';

        const data = loadBooks();
        if (!data.activeBookId && CONFIG.activeTab !== 'tags-cover') {
            out.innerHTML = '<div style="padding:20px;color:#94a3b8;text-align:center;">请先在左侧新建一本书籍</div>';
            return;
        }
        if (!rawInput && CONFIG.activeTab !== 'cover' && CONFIG.activeTab !== 'tags-cover') return;

        let chapters = [];

        if (CONFIG.activeTab === 'cover') {
            renderCoverTab(rawInput);
            return;
        } else if (CONFIG.activeTab === 'volume-outline') {
            renderVolumeOutlineTab(rawInput);
            return;
        } else if (CONFIG.activeTab === 'tags-cover') {
            renderTagsCoverTab();
            return;
        } else if (CONFIG.activeTab === 'gen') {
            // 模式1：解析细纲 (通常是大纲阶段，较简单)
            chapters = rawInput.split(/\n(?=第\s*\d+\s*章)|(?=\n【第\s*\d+\s*章)/g)
                .map(block => {
                    const lines = block.trim().split('\n');
                    return { title: lines[0].replace(/[【】\\#\*]/g, '').substring(0, 50), content: block.trim() };
                }).filter(c => c.content.length > 10);
        } else if (CONFIG.activeTab === 'volumes') {
            chapters = rawInput.split(/\n(?=第\s*[0-9一二三四五六七八九十百千两零]+\s*卷)/g)
                .map(block => block.trim())
                .filter(block => /^第\s*[0-9一二三四五六七八九十百千两零]+\s*卷/.test(block))
                .map(block => {
                    const lines = block.split('\n');
                    const title = lines[0].trim();
                    const body = lines.slice(1).join('\n').trim();
                    return {
                        title,
                        body,
                        content: body ? `${title}\n${body}` : title
                    };
                })
                .filter(volume => volume.body.length > 0);
        } else {
            // 模式2：智能正文提取 (针对 Gemini 导出对话)
            
            // 1. 核心改进：通过对话轮次分割，只看 Response
            const turns = rawInput.split(/##\s*Prompt:?/gi);
            
            turns.forEach(turn => {
                // 在每一轮对话中，通过 ## Response 分隔指令和答案
                const parts = turn.split(/##\s*Response:?/gi);
                if (parts.length < 2) return; // 没有 AI 回复的部分直接跳过
                
                const aiContent = parts[1]; // 这才是小说正文所在的块
                
                // 2. 在 AI 的回复里寻找真正的章节标题
                // 匹配：行首数字+点 或 行首#+数字+点 或 行首第X章
                const blocks = aiContent.split(/\n(?=\d+\\?[\.|\s|、])|\n(?=#+\s*\d+\\?[\.|\s])|\n(?=第\s*\d+\s*章)/g);
                
                blocks.forEach(block => {
                    const lines = block.trim().split('\n');
                    if (lines.length < 2) return; // 只有一行的通常是杂质
                    
                    let title = lines[0].replace(/[#\*\【\】\\]/g, '').trim();
                    
                    // 3. 过滤噪音：剔除指令、元数据和无意义短句
                    const noiseKeywords = ['剧情截断', '核心要求', 'Exported:', 'Link:', 'Powered by'];
                    if (noiseKeywords.some(key => title.includes(key))) return;
                    if (title.length > 80 || title.length < 2) return;
                    
                    // 识别正文：跳过标题行和 Markdown 分割线
                    let bodyStart = 1;
                    if (lines[1] && lines[1].match(/^[=\-\*]{3,}$/)) bodyStart = 2;
                    const body = lines.slice(bodyStart).join('\n').trim().replace(/\\/g, '');
                    
                    if (body.length > 100) { // 小说正文至少得有100字吧
                        chapters.push({ title, body });
                    }
                });
            });
        }

        document.getElementById('count-badge').innerText = chapters.length;

        chapters.forEach((ch, i) => {
            const id = `ch-${i}`;
            const navItem = document.createElement('div');
            navItem.className = 'nav-item';
            navItem.innerText = ch.title;
            navItem.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
                navItem.classList.add('active-nav');
                document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'start' });
            };
            nav.appendChild(navItem);

            const card = document.createElement('div');
            card.className = 'card';
            card.id = id;

            if (CONFIG.activeTab === 'gen') {
                const fullPrompt = `${CONFIG.PREFIX}${ch.content}${CONFIG.SUFFIX}`;
                card.innerHTML = `
                    <div class="card-title"><span>${ch.title}</span><button class="btn-secondary" style="font-size:11px;" onclick="copyAction(this, \`${escapeForTemplateLiteral(fullPrompt)}\`)">复制提示词</button></div>
                    <div class="prompt-box">${fullPrompt}</div>`;
            } else if (CONFIG.activeTab === 'volumes') {
                const segments = getVolumeSegments(ch.title);
                const segmentButtons = segments.map(segment => `
                    <button class="btn-segment" onclick="copyAction(this, \`${escapeForTemplateLiteral(buildVolumePrompt(ch, segment))}\`)">复制${segment}</button>
                `).join('');
                card.innerHTML = `
                    <div class="card-title"><span>${ch.title} <span class="word-tag">${ch.body.length}字</span></span></div>
                    <div class="preview-text">${ch.body.substring(0, 400)}...</div>
                    <div style="font-size:12px; color:#64748b; line-height:1.6;">这 1 卷会自动生成 6 份 Gemini 提示词，并按卷号自动顺延章节区间：</div>
                    <div class="btn-group">
                        ${segmentButtons}
                    </div>
                    <div class="prompt-box">${segments[0] ? buildVolumePrompt(ch, segments[0]) : '未识别到有效卷号，无法生成章节区间。'}</div>`;
            } else {
                const cleanTitle = ch.title.replace(/^[\d\.\s#第章节、：\\]+/, '').trim();
                card.innerHTML = `
                    <div class="card-title"><span>${ch.title} <span class="word-tag">${ch.body.length}字</span></span></div>
                    <div class="preview-text">${ch.body.substring(0, 400)}...</div>
                    <div class="btn-group">
                        <button class="btn-title" onclick="copyAction(this, \`${cleanTitle}\`)">复制净标题</button>
                        <button class="btn-body" onclick="copyAction(this, \`${escapeForTemplateLiteral(ch.body)}\`)">复制全正文</button>
                    </div>`;
            }
            out.appendChild(card);
        });
    }

    function copyAction(btn, text) {
        const temp = document.createElement('textarea');
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        const old = btn.innerText;
        btn.innerText = "√ 已复制";
        setTimeout(() => { btn.innerText = old; }, 1000);
    }

    function clearContent() {
        if(confirm("确定清空吗？")) {
            editor.value = '';
            saveToCurrentBook();
            manualRefresh();
        }
    }

    window.onload = () => {
        const data = loadBooks();
        renderBookList();
        if (data.activeBookId) {
            const book = data.books.find(b => b.id === data.activeBookId);
            if (book) editor.value = book.tabs[CONFIG.activeTab] || '';
        }
        manualRefresh();
    };

    // === 封面选题 Tab ===
    function renderCoverTab(rawInput) {
        const out = document.getElementById('output-list');

    function saveTagsContent() {
        const data = loadBooks();
        const book = data.books.find(b => b.id === data.activeBookId);
        if (book) {
            book.tabs['tags-cover'] = document.getElementById('saved-tags').value;
            saveBooks(data);
        }
    }

    function exportData() {
        const data = loadBooks();
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `小说数据_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (!data.books || !Array.isArray(data.books)) {
                    alert('文件格式不正确');
                    return;
                }
                if (!confirm(`识别到 ${data.books.length} 本书籍，确定导入吗？（将覆盖当前数据）`)) return;
                saveBooks(data);
                if (data.activeBookId) switchBook(data.activeBookId);
                else { renderBookList(); manualRefresh(); }
                alert('导入成功！');
            } catch (err) {
                alert('文件解析失败：' + err.message);
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }
