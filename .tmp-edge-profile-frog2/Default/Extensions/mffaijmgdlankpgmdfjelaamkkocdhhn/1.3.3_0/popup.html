<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <style>
        table {
            width: 300px;
        }

        tr {
            padding: 10px 0;
        }

        .desc {
        }
    </style>
</head>
<body>
<div id="warning" style="text-align: center;width: 360px;">请在B站视频播放页面使用该扩展</div>
<div id="main" style="display: none">
    <table style="width: 500px">
        <tr>
            <td><input type="text" id="dm-limit" value="5000" style="width: 50px"></td>
            <td class="desc"><label for="dm-limit">限制单集弹幕数量</label>, <select id="dm-limit-prefer-old-ones">
                <option value="0">超出后保留新发的弹幕</option>
                <option value="1">超出后保留旧发的弹幕</option>
            </select>, 默认:5000, 保留新
            </td>
        </tr>
        <tr>
            <td><input type="text" id="font-size" value="17" style="width: 50px"></td>
            <td class="desc"><label for="font-size">弹幕字体大小, 默认:17</label></td>
        </tr>
        <tr>
            <td><input type="text" id="font-opacity" value="128" style="width: 50px"></td>
            <td class="desc"><label for="font-opacity">字体透明度,范围: 0~255. 255为全透明, 默认:128</label></td>
        </tr>
        <tr>
            <td><input type="text" id="offset" value="0.00" style="width: 50px"></td>
            <td class="desc"><label for="offset">弹幕出现时间偏移秒数设置. 正数提前, 负数延后.用于跳过一些多余的片头时间</label></td>
        </tr>
        <tr>
            <td><input type="text" id="move-speed" value="21" style="width: 50px"></td>
            <td class="desc"><label for="move-speed">弹幕移动速度, 数值越大越慢. 默认:21</label></td>
        </tr>
        <tr>
            <td><input type="checkbox" id="try-skip" value="1"></td>
            <td class="desc"><label for="try-skip">尝试跳过特殊集. 如"11.5","总集篇","SP"这类</label></td>
        </tr>
    </table>
    <br>
    <button id="download">开始下载弹幕</button>

    <div id="ext-dm-tips-wrap-point-el"></div>

    <script src="popup.js"></script>
</div>
</body>
</html>
